    <link rel="stylesheet" href="styles.css">
    <!-- Load main script BEFORE Google's script so callbacks are defined -->
    <script src="script.js?v=20260516-1" defer></script>
    <!-- Defensive stub: if script.js fails to parse on the deployed site,
         expose minimal globals so Google's GSI won't throw 'callback not a function'.
         The real handlers in script.js will overwrite these when/if it executes. -->
    <script>
        // Minimal safe stubs for GSI to call even if script.js is broken on the page
        window.handleGoogleSignIn = window.handleGoogleSignIn || function(response) {
            console.warn('GSI stub: handleGoogleSignIn invoked before app script loaded');
            // store the response so the real handler can pick it up later if desired
            window.__deferredGSIResponse = response;
        };
        window.decodeJwtResponse = window.decodeJwtResponse || function(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c){return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);}).join('')));
            } catch (e) {
                return {};
            }
        };
    </script>
    <!-- Google Sign-In library loads after our callbacks are defined -->
    <script src="https://accounts.google.com/gsi/client" defer></script>

<body>
    <header>

    <main class="auth-container">

            <form class="auth-form" id="login-form" aria-label="Login form">
                <div class="form-group">
                    <label for="username" class="sr-only">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password" class="sr-only">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary btn-full" id="login-submit-btn">Sign in</button>
            </form>

            <div class="social-login">
                <p class="or-divider"><span>or</span></p>
                <div id="g_id_onload"
                     data-client_id="721203537926-98l6moj4ojodl8ipf94kb9obafig7ifm.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleSignIn"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="center"
                     data-width="280">
                </div>
            </div>

            <p class="auth-redirect">Don't have an account? <a href="register.html">Sign up free</a></p>
        </div>
    </main>

                <a href="#" class="social-icon" aria-label="LinkedIn"><i class="fab fa-linkedin-in" aria-hidden="true"></i></a>
            </div>
        </div>
    </footer>
</body>
